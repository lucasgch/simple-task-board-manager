# Configuração da aplicação
spring.application.name=SimpleTaskBoardManager

# Configuração do banco H2
# Fonte única de verdade para a conexão: DataConfig injeta estes valores via @Value.
# As credenciais devem permanecer estas — bancos existentes dos usuários foram criados com elas.
# app.data.dir é definida pelo pre-flight (DataDirectoryPreflight) no main();
# o fallback ${user.home}/myboards cobre testes e contextos que não passam pelo main().
spring.datasource.url=jdbc:h2:file:${app.data.dir:${user.home}/myboards}/board_h2_db;AUTO_SERVER=TRUE;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=myboarduser
spring.datasource.password=myboardpassword

# Configuração do H2 Console (opcional)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Configuração do JPA
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# Configuração do Liquibase para migrações automáticas
# Disabled temporarily due to conflict with existing schema.sql database
spring.liquibase.enabled=false
# spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yml
# spring.liquibase.contexts=prod
# spring.liquibase.default-schema=public

# Configuração de logging
logging.level.org.desviante=INFO
logging.level.org.springframework=INFO
logging.level.liquibase=INFO

# Configuração para executar schema.sql apenas na primeira inicialização
spring.sql.init.mode=embedded
spring.sql.init.schema-locations=classpath:schema.sql

# Configuração para preservar dados durante atualizações
# (spring.jpa.hibernate.ddl-auto=validate já definido na seção do JPA acima)
spring.jpa.defer-datasource-initialization=false

# Configuração da integração com Google Tasks
google.api.enabled=true