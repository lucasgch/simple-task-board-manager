spring.profiles.active=test

# Este arquivo sombreia o application.properties principal no classpath de teste,
# portanto o datasource precisa ser definido aqui. H2 em memória para os testes
# nunca tocarem o banco real do usuário (~/myboards).
spring.datasource.url=jdbc:h2:mem:integration-testdb;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
