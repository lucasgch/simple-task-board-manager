name: Build Cross-Platform Installers

on:
  push:
    branches: [ main, develop ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java-version: [25]

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK ${{ matrix.java-version }}
      uses: actions/setup-java@v4
      with:
        java-version: ${{ matrix.java-version }}
        distribution: 'temurin'

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle
      run: ./gradlew build -x test

    - name: Generate Linux Installers
      run: |
        ./gradlew jpackageLinux
        ./gradlew jpackageLinuxDeb
        ./gradlew jpackageLinuxRpm

    - name: Upload Linux Installers
      uses: actions/upload-artifact@v4
      with:
        name: linux-installers
        path: |
          build/dist/*.AppImage
          build/dist/*.deb
          build/dist/*.rpm
        retention-days: 30

  build-windows:
    runs-on: windows-latest
    strategy:
      matrix:
        java-version: [25]

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK ${{ matrix.java-version }}
      uses: actions/setup-java@v4
      with:
        java-version: ${{ matrix.java-version }}
        distribution: 'temurin'

    - name: Build with Gradle
      run: ./gradlew build -x test

    - name: Generate Windows Installer
      run: ./gradlew jpackage

    - name: Upload Windows Installer
      uses: actions/upload-artifact@v4
      with:
        name: windows-installer
        path: build/dist/*.exe
        retention-days: 30

  create-release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          artifacts/linux-installers/*.AppImage
          artifacts/linux-installers/*.deb
          artifacts/linux-installers/*.rpm
          artifacts/windows-installer/*.exe
        draft: false
        prerelease: false
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
